<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AI Drone Vision</title>

<!-- External styles (Leaflet map + your custom CSS) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- Top bar: branding + system indicators -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="brand">DRONE<em>OPS</em></div>
    <span class="btag bt-g" style="font-size:8px">LIVE</span>
  </div>

  <!-- Right side status chips -->
  <div class="top-right">
    <div class="chip hm"><span class="dot dot-g"></span>MODEL</div>
    <div class="chip"><span class="dot dot-g"></span>FEED</div>
    <div class="chip hm"><span class="rec-dot"></span>REC</div>

    <!-- Alerts button -->
    <button class="alerts-btn" onclick="toggleAlerts()">
      🔔 <span class="count" id="alerts-count">0</span>
    </button>

    <!-- Live clock -->
    <div id="clock">--:--:--</div>
  </div>
</div>

<!-- Navigation tabs (used mainly for mobile view) -->
<nav class="nav" id="nav">
  <button class="active" onclick="showTab('feed',this)">📹 FEED</button>
  <button onclick="showTab('det',this)">🎯 DETECTIONS</button>
  <button onclick="showTab('map',this)">🗺 MAP</button>
</nav>

<!-- Main layout container -->
<div class="layout" id="layout">

  <!-- Left panel: stats + detection list -->
  <div class="col" id="col-det">
    <div class="sec">// SESSION</div>

    <div class="scroll">
      <!-- Live stats -->
      <div class="stats">
        <div class="sc">
          <div class="v" id="s-fps">--</div>
          <div class="l">FPS</div>
        </div>

        <div class="sc">
          <div class="v" id="s-alerts">0</div>
          <div class="l">ALERTS</div>
        </div>

        <div class="sc wide">
          <div class="v" id="s-total">0</div>
          <div class="l">TOTAL DETECTIONS</div>
        </div>
      </div>

      <!-- Detection cards -->
      <div class="sec">// LIVE DETECTIONS</div>
      <div id="det-list">
        <div class="no-det">Waiting for feed...</div>
      </div>
    </div>
  </div>

  <!-- Center panel: video feed -->
  <div class="col feed-col show" id="col-feed">
    <div class="feed-wrap">

      <!-- Live stream -->
      <img id="vfeed" src="/video_feed" alt="feed"/>

      <!-- UI overlays -->
      <div class="zone-label">◄ LOCK ZONE ►</div>

      <!-- Snapshot button -->
      <button id="snap-btn" onclick="doSnap()">
        📷 SNAPSHOT
      </button>

      <!-- Camera toggle -->
      <button id="cam-toggle" onclick="toggleCamera()">
        🎥 CAM OFF
      </button>

      <!-- Effects -->
      <div id="snap-flash"></div>
      <div id="snap-toast">✓ SAVED</div>
    </div>
  </div>

  <!-- Right panel: telemetry + map -->
  <div class="col" id="col-map">
    <div class="sec">// TELEMETRY</div>

    <!-- Telemetry values -->
    <div class="tgrid">
      <div class="tc"><div id="t-lat">--</div><div>LAT</div></div>
      <div class="tc"><div id="t-lon">--</div><div>LON</div></div>
      <div class="tc"><div id="t-alt">--</div><div>ALT</div></div>
      <div class="tc"><div id="t-spd">--</div><div>SPD</div></div>
      <div class="tc"><div id="t-hdg">--</div><div>HDG</div></div>
      <div class="tc"><div id="t-bat">--</div><div>BAT</div></div>
    </div>

    <!-- Map container -->
    <div class="map-wrap">
      <div id="map"></div>
      <div id="gps-badge"></div>
    </div>
  </div>

</div>

<!-- Alerts history panel -->
<div class="alerts-panel" id="alerts-panel">
  <div class="ap-head">
    <div>// ALERT HISTORY</div>
    <button onclick="toggleAlerts()">×</button>
  </div>

  <div id="ap-body">
    <div class="no-alerts">No alerts yet...</div>
  </div>
</div>

<!-- Bottom info bar -->
<div class="bot">
  <span>KANAK SAINI</span>
  <span class="btag">YOLOv8n</span>
  <span class="btag">OPENCV</span>
  <span class="btag">FLASK</span>
  <span class="btag">RESCUE OPS</span>
  <span style="flex:1"></span>
  <span id="bot-dets">0 detections</span>
</div>

<!-- Leaflet map script -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Live clock updater
(function tick(){
  const n=new Date();
  const p=v=>String(v).padStart(2,'0');
  document.getElementById('clock').textContent =
    p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
  setTimeout(tick,1000);
})();

// Switch tabs (mobile view)
function showTab(tab,btn){
  document.querySelectorAll('.col').forEach(c=>c.classList.remove('show'));
  document.getElementById('col-'+tab)?.classList.add('show');

  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  btn?.classList.add('active');
}

// Basic Leaflet map setup
const _map=L.map('map',{center:[28.6139,77.209],zoom:15});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(_map);

// Poll detections from backend
async function pollDets(){
  try{
    const r=await fetch('/api/detections');
    const d=await r.json();

    document.getElementById('s-fps').textContent=d.fps;
    document.getElementById('s-total').textContent=d.total_dets;
    document.getElementById('bot-dets').textContent=d.total_dets+' detections';

  }catch(e){}
}

// Take snapshot from backend
async function doSnap(){
  try{
    const res=await fetch('/snapshot');
    const blob=await res.blob();

    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='snapshot.jpg';
    a.click();

    URL.revokeObjectURL(url);
  }catch(e){}
}

// Toggle camera state
async function toggleCamera(){
  try{
    const res = await fetch('/toggle_camera', { method: 'POST' });
    const data = await res.json();

    const btn = document.getElementById("cam-toggle");

    if(data.camera_on){
      btn.innerHTML = "🎥 CAM OFF";
    } else {
      btn.innerHTML = "⛔ CAM ON";
    }

  }catch(e){
    console.error("Camera toggle failed", e);
  }
}

// Poll data regularly
setInterval(pollDets,500);
pollDets();
</script>

</body>
</html>
